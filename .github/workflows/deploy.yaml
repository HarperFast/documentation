name: Deploy Docusaurus to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'fabric/**'
      - 'learn/**'
      - 'release-notes/**'
      - 'src/**'
      - 'static/**'
      - 'versioned_docs/**'
      - 'versioned_sidebars/**'
      - 'docusaurus.config.ts'
      - 'package-lock.json'
      - 'package.json'
      - 'redirects.ts'
      - 'sidebars*.ts'
      - 'versions.json'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Concurrency configuration to manage parallel workflow runs
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: |
          echo "Installing dependencies from $(pwd)"
          npm ci || (echo "npm ci failed, uploading logs" && exit 1)

      - name: Build Docusaurus site
        env:
          DOCUSAURUS_ROUTE_BASE_PATH: ${{ vars.DOCUSAURUS_ROUTE_BASE_PATH }}
          DOCUSAURUS_BASE_URL: ${{ vars.DOCUSAURUS_BASE_URL }}
          DOCUSAURUS_URL: ${{ vars.DOCUSAURUS_URL }}
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_SEARCH_KEY: ${{ secrets.ALGOLIA_SEARCH_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
          GA4_TRACKING_ID: ${{ secrets.GA4_TRACKING_ID }}
        run: |
          echo "Building Docusaurus site..."
          echo "Using DOCUSAURUS_ROUTE_BASE_PATH: $DOCUSAURUS_ROUTE_BASE_PATH"
          echo "Using DOCUSAURUS_BASE_URL: $DOCUSAURUS_BASE_URL"
          echo "Using DOCUSAURUS_URL: $DOCUSAURUS_URL"
          npm run build || (echo "Site build failed" && exit 1)

      - name: Verify flat-markdown export
        run: |
          # @signalwire/docusaurus-plugin-llms-txt should have produced one
          # .md file per HTML page plus an llms.txt index. This artifact is
          # consumed by @harperfast/skills (and any third-party LLM tooling).
          # Fail the build loudly if it didn't run or produced no output.
          set -euo pipefail
          failures=0
          for dir in learn reference fabric release-notes; do
            count=$(find "build/$dir" -name '*.md' 2>/dev/null | wc -l | tr -d ' ')
            if [ "$count" -lt 1 ]; then
              echo "::error::No .md files generated under build/$dir/ — llms-txt plugin failed for this docs instance"
              failures=$((failures + 1))
            else
              echo "build/$dir: $count .md files"
            fi
          done
          for f in build/llms.txt build/llms-full.txt; do
            if [ ! -f "$f" ]; then
              echo "::error::Expected artifact $f is missing"
              failures=$((failures + 1))
            fi
          done
          if [ "$failures" -gt 0 ]; then
            exit 1
          fi
          echo "✓ Flat-markdown export verified"

      - name: Upload npm logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: npm-logs
          path: |
            ~/.npm/_logs/

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    needs: build
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Notify the skills repo that docs changed, so it can regenerate its
  # docs-driven rules against the just-deployed content. See the
  # generate.yaml workflow in HarperFast/skills (Phase 2 of the
  # docs-driven-skills plan). Requires SKILLS_DISPATCH_TOKEN — a PAT or
  # App token with contents:write on HarperFast/skills (the default
  # GITHUB_TOKEN is scoped to this repo only and cannot dispatch across
  # repos). If the secret is absent, the step is skipped (the skills repo
  # also runs a weekly safety-net cron).
  notify-skills:
    needs: deploy
    name: Notify skills repo
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs-updated to HarperFast/skills
        # secrets can't be used in an `if:` expression, so guard inside the
        # script: if the token is absent, skip cleanly (the skills repo's
        # weekly cron is the safety net).
        env:
          GH_TOKEN: ${{ secrets.SKILLS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SKILLS_DISPATCH_TOKEN not set — skipping dispatch (skills repo cron will pick up docs changes)."
            exit 0
          fi
          gh api repos/HarperFast/skills/dispatches \
            -f event_type=docs-updated \
            -F client_payload[sha]=${{ github.sha }}

