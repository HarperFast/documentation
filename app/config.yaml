# Harper docs-site application
# NOTE: providing config.yaml replaces Harper's defaults entirely — list everything.

loadEnv:
  files: '.env*'

graphqlSchema:
  files: 'schemas/*.graphql'

jsResource:
  files: 'resources/*.ts'

rest: true

# Google OAuth for the admin area (@harperfast/oauth). Credentials + redirect
# URI come from the environment (loadEnv, above) — never commit them. Register
# the OAUTH_REDIRECT_URI as an authorized redirect in the Google Cloud OAuth
# client (e.g. http://localhost:9936/oauth/google/callback for local dev).
'@harperfast/oauth':
  package: '@harperfast/oauth'
  redirectUri: ${OAUTH_REDIRECT_URI}
  postLoginRedirect: /admin/ingest
  providers:
    google:
      clientId: ${GOOGLE_CLIENT_ID}
      clientSecret: ${GOOGLE_CLIENT_SECRET}

# NOTE: `urlPath` on the static plugin is broken in Harper 5.1.15 (files never
# serve at the derived path — bisected in a minimal component; file as platform
# feedback). Workaround: nest under web/assets/ so the glob-base strip yields
# the /assets/... URLs the layout links to.
static:
  files: 'web/**'
