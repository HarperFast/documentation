# Harper docs-site application
# NOTE: providing config.yaml replaces Harper's defaults entirely — list everything.

loadEnv:
  files: '.env*'

graphqlSchema:
  files: 'schemas/*.graphql'

jsResource:
  files: 'resources/*.js'

rest: true

# NOTE: `urlPath` on the static plugin is broken in Harper 5.1.15 (files never
# serve at the derived path — bisected in a minimal component; file as platform
# feedback). Workaround: nest under web/assets/ so the glob-base strip yields
# the /assets/... URLs the layout links to.
static:
  files: 'web/**'
