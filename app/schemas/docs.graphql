# Content tables for the docs site. All content tables are release-scoped:
# a ContentRelease is staged, validated whole, then atomically activated.
# See plans/harper-replatform/README.md §5–6.

# Singleton pointer: which ContentRelease is live. Activation is one
# primary-key write; serving is one primary-key read. The status field on
# ContentRelease is bookkeeping only — nothing on the serving path scans it.
type SitePointer @table {
	id: ID @primaryKey # always 'active'
	release: String
	updatedAt: Date @updatedTime
}

type ContentRelease @table {
	id: ID @primaryKey # "<git-sha>-<timestamp>"
	status: String @indexed # staging | active | archived | failed
	gitSha: String
	pageCount: Int
	chunkCount: Int # total SearchChunks — BM25 corpus size N
	avgChunkLength: Float # mean chunk token count — BM25 length normalization
	notes: String
	createdAt: Date @createdTime
	activatedAt: Date
}

# Ingest/build observability: one row per ingest run, created at `begin` and
# finalized at `activate`. A row stuck on status=running signals a crashed or
# hung ingest. 90-day TTL via table expiration. Surfaced in the admin dashboard.
type IngestRun @table(expiration: 7776000) {
	id: ID @primaryKey # the release id
	gitSha: String
	status: String @indexed # running | activated | rejected | failed
	pages: Int
	chunks: Int
	terms: Int
	nav: Int
	redirects: Int
	avgChunkLength: Float
	pruned: Int # old releases removed this run
	guard: Any # activation guard result: { expected, actual, mismatch[] }
	error: String # failure/rejection reason, if any
	startedAt: Date @createdTime
	finishedAt: Date
	durationMs: Int
}

type Page @table {
	id: ID @primaryKey # "<release>:<path>"
	release: String @indexed
	path: String @indexed # canonical route, '' for the homepage
	section: String @indexed # learn | reference | release-notes | fabric | root
	version: String # v5 | v4 (reference only)
	title: String
	description: String
	html: String # rendered article body (no layout shell)
	toc: Any # [{depth, text, id}]
	sourceMarkdown: String
	renderedMarkdown: String # clean markdown projection → .md routes, llms.txt
	frontmatter: Any
	editUrl: String
	sourcePath: String
	contentHash: String @indexed
	updatedAt: Date @updatedTime
}

type Navigation @table {
	id: ID @primaryKey # "<release>:<section>" or "<release>:<section>:<version>"
	release: String @indexed
	section: String @indexed
	version: String
	tree: Any # ordered nested [{label, path?, items?[]}]
}

type Redirect @table {
	id: ID @primaryKey # "<release>:<from>"
	release: String @indexed
	from: String @indexed
	to: String
	status: Int
	source: String # current | historic | tombstone
}

# Retrieval unit for search (M2). One per h2/h3 section (+ page intro).
# Carries the per-chunk statistics BM25 needs so query-time scoring is
# arithmetic over stored values — no standing in-memory index.
type SearchChunk @table {
	id: ID @primaryKey # "<release>:<path>#<anchor>:<position>"
	release: String @indexed
	pageId: String
	path: String
	section: String @indexed
	version: String @indexed
	title: String # page title — ranking boost
	heading: String # nearest heading — ranking boost, result display
	anchor: String # in-page anchor for deep-linked results
	breadcrumb: [String] # nav path, shown under each result
	position: Int # chunk order within the page
	text: String # plain text — snippet + tokenization source
	tokens: [String] @indexed # normalized terms — indexed per-element retrieval
	termCounts: Any # { term: occurrences } — BM25 term frequency
	length: Int # token count — BM25 length normalization
	# Semantic lane (M2b). @embed auto-computes the vector from embedText at
	# write time (via the configured `default` model) and builds the HNSW index.
	# The ingest client paces + retries page batches so the provider's rate
	# budget absorbs the per-record embed calls (the backend does not retry).
	# NOTE: the @embed `model` (a logical name) is also forwarded to the backend
	# as the WIRE model, so the logical name MUST equal the provider model id —
	# a mismatch (e.g. "default") is sent to the API verbatim and 404s.
	embedText: String
	embedding: [Float] @embed(source: "embedText", model: "gemini-embedding-001")
}

# Term dictionary per release: document frequency (BM25 rarity signal) and
# indexed trigrams for typo/fuzzy resolution. All lookups by index; no
# standing in-memory structures.
type Term @table {
	id: ID @primaryKey # "<release>:<term>"
	release: String @indexed
	term: String @indexed
	docFreq: Int # chunks containing the term
	trigrams: [String] @indexed # for fuzzy matching of unknown query terms
}

# Every query from the search UI (and later the agent/MCP). Zero-result rows
# are the content-gap report. Expires after 90 days.
type SearchQueryLog @table(expiration: 7776000) {
	id: ID @primaryKey
	query: String
	querySource: String @indexed # ui | agent | mcp
	section: String
	version: String
	resultCount: Int @indexed
	createdAt: Date @createdTime
}

# Relevance-validation runs: one row per `search-eval` invocation (golden-set
# MRR/Recall gate). Trend is charted in the admin Validation panel. 90-day TTL.
type EvalRun @table(expiration: 7776000) {
	id: ID @primaryKey # "<timestamp>-<rand>"
	gitSha: String
	mrr: Float
	recall5: Float
	recall10: Float
	zeroRate: Float
	cases: Int # number of golden-set queries scored
	weak: Int # correct-but-ranked-4+ count
	passed: Boolean # against --min-mrr, when supplied (else null)
	createdAt: Date @createdTime
}

# Content-parity runs: one row per `parity` invocation (served site vs the
# Docusaurus build). Trend is charted in the admin Validation panel. 90-day TTL.
type ParityRun @table(expiration: 7776000) {
	id: ID @primaryKey # "<timestamp>-<rand>"
	gitSha: String
	pages: Int
	titlesOk: Int
	redirectsOk: Int
	simMedian: Float # median text similarity (%)
	simMin: Float # minimum text similarity (%)
	hardFailures: Int
	strict: Boolean # was --strict gating on
	passed: Boolean
	createdAt: Date @createdTime
}

# M3 chat observability: one row per grounded chat answer. Powers the admin Chat
# panel (volume, latency, grounded rate, top questions, feedback). 90-day TTL.
type ChatLog @table(expiration: 7776000) {
	id: ID @primaryKey # "<timestamp>-<rand>"
	question: String
	answer: String # the streamed answer (may be truncated for storage)
	sources: Any # [{ rank, path, title, url }] the retrieval grounded on
	grounded: Boolean @indexed # did retrieval return any context?
	model: String # generation model id (or "stub")
	promptChars: Int
	answerChars: Int
	latencyMs: Int
	sessionId: String # opaque per-browser id (best-effort)
	ipHash: String # hashed client IP (never store raw IPs)
	feedback: Int @indexed # -1 | 0 | +1 (thumbs), 0 = none
	createdAt: Date @createdTime
}

# Per-IP daily chat quota counter. id = "<ipHash>:<yyyy-mm-dd>". Short TTL (2
# days) so counters self-expire; the cap resets each UTC day via the id.
type ChatQuota @table(expiration: 172800) {
	id: ID @primaryKey
	count: Int
	updatedAt: Date @updatedTime
}
